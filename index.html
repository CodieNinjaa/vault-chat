function b64e(buf){const b=new Uint8Array(buf);let s='';for(let i=0;i<b.length;i++)s+=String.fromCharCode(b[i]);return btoa(s)}

async function ghReq(path,method='GET',body=null){

    const lines=[];
    for(const msg of msgHistory){
      if(msg.type==='text'){
        try{const plain=await decStr(msg.ct,msg.iv);lines.push({from:msg.sender,time:new Date(msg.ts).toLocaleString(),text:plain})}
        catch{lines.push({from:msg.sender,time:new Date(msg.ts).toLocaleString(),text:'[encrypted]'})}
      }else{
        lines.push({from:msg.sender,time:new Date(msg.ts).toLocaleString(),type:msg.type,file:msg.name||'media'});
      }
    }
    const json=JSON.stringify({vault:"Deeksha's Secret",exportedAt:new Date().toISOString(),totalMessages:lines.length,messages:lines},null,2);
    const encrypted=await encStrToBlob(json);
    await ghUpload('backup/chat.enc',encrypted,'Update chat backup');
  }catch(e){console.warn('Backup failed:',e)}
}
function scheduleBackup(){clearTimeout(backupTimer);backupTimer=setTimeout(backupAllMessages,10000)}

async function initFB(){
  if(firebase.apps.length)firebase.apps.forEach(a=>a.delete());
  firebase.initializeApp(FB_CFG);db=firebase.database();auth=firebase.auth();
  try{await auth.signInAnonymously()}catch(e){console.error(e)}
}

function updatePresenceUI(data={}){
  const el=document.getElementById('presence-dots');el.innerHTML='';
  USERS.forEach(name=>{const on=data[name]===true;const d=document.createElement('div');d.className='pdot'+(on?' online':'');d.textContent=UMETA[name].av;d.title=name+': '+(on?'online':'offline');el.appendChild(d)});
  const other=USERS.find(n=>n!==currentUser);const otherOn=data[other]===true;
  const sub=document.getElementById('other-status');sub.textContent=otherOn?'online now':'offline';sub.className='hdr-sub'+(otherOn?' online':'');
}
async function setPresence(){
  presRef=db.ref(`presence/${currentUser}`);typRef=db.ref(`typing/${currentUser}`);
  presRef.onDisconnect().set(false);typRef.onDisconnect().set(false);
  await presRef.set(true);await typRef.set(false);
  db.ref('presence').on('value',snap=>updatePresenceUI(snap.val()||{}));
  db.ref('typing').on('value',snap=>{const td=snap.val()||{};const other=USERS.find(n=>n!==currentUser);typingEl.innerHTML=td[other]?`<span>${other} is typing</span><div class="dots"><span></span><span></span><span></span></div>`:''});
}

async function loadMessages(){
  db.ref('messages').off();
  db.ref('messages').orderByChild('ts').on('child_added',async snap=>{
    const msg=snap.val();msg.key=snap.key;
    if(msgKeys.has(snap.key))return;
    msgKeys.add(snap.key);msgHistory.push(msg);
    await renderMsg(msg);scrollBottom();
  });
}
function scrollBottom(){setTimeout(()=>{msgList.scrollTop=msgList.scrollHeight},80)}
function fmtSize(b){if(!b)return'';if(b<1024)return b+' B';if(b<1048576)return(b/1024).toFixed(1)+' KB';return(b/1048576).toFixed(1)+' MB'}

async function renderMsg(msg){
  const isMe=msg.sender===currentUser;const meta=UMETA[msg.sender]||UMETA[USERS[1]];
  const day=new Date(msg.ts).toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'});
  const time=new Date(msg.ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  const isConsec=lastSender===msg.sender&&lastDay===day;lastSender=msg.sender;lastDay=day;
  if(!msgList.querySelector(`[data-day="${CSS.escape(day)}"]`)){const sep=document.createElement('div');sep.className='day-sep';sep.textContent=day;sep.setAttribute('data-day',day);msgList.appendChild(sep)}
  const row=document.createElement('div');row.className='message-row'+(isMe?' mine':'')+(isConsec?' consec':'');
  const av=document.createElement('div');av.className='row-av '+(meta.avCls||'');av.style.cssText=meta.style||'';av.textContent=meta.av;row.appendChild(av);
  const col=document.createElement('div');col.className='row-col';
  const sEl=document.createElement('div');sEl.className='row-sender';sEl.textContent=msg.sender;col.appendChild(sEl);
  const bub=document.createElement('div');bub.className='message-bubble';
  if(msg.type==='text'){
    try{const plain=await decStr(msg.ct,msg.iv);const linked=esc(plain).replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank" rel="noopener" style="color:inherit;opacity:.8;word-break:break-all">$1</a>');bub.innerHTML=linked}
    catch{bub.innerHTML='<span class="warn">⚠ Could not decrypt</span>'}
  }else if(msg.type==='image'||msg.type==='video'){bub.appendChild(buildMediaBubble(msg))}
  col.appendChild(bub);const tEl=document.createElement('div');tEl.className='msg-time';tEl.textContent=time;col.appendChild(tEl);
  row.appendChild(col);msgList.appendChild(row);
}

function buildMediaBubble(msg){
  const wrap=document.createElement('div');
  const loading=document.createElement('div');loading.className='file-label';loading.textContent=`⏳ Loading ${esc(msg.name||'file')}…`;wrap.appendChild(loading);
  (async()=>{
    try{
      const encBuf2=await ghDownload(msg.ghPath);const decBuf2=await decBuf(encBuf2,msg.iv);
      const blob=new Blob([decBuf2],{type:msg.contentType||'application/octet-stream'});const objUrl=URL.createObjectURL(blob);
      wrap.innerHTML='';
      const mw=document.createElement('div');mw.className='media-wrap';
      const isVid=msg.type==='video';const el=document.createElement(isVid?'video':'img');
      if(isVid){el.controls=true;el.preload='metadata'}
      el.src=objUrl;el.alt=msg.name||'';el.addEventListener('click',()=>openLB(msg.type,objUrl,msg.name||'file'));
      mw.appendChild(el);wrap.appendChild(mw);
      const fn=document.createElement('div');fn.className='file-label';fn.textContent=(msg.name||'file')+(msg.size?' · '+fmtSize(msg.size):'');wrap.appendChild(fn);
      const dl=document.createElement('a');dl.className='dl-btn';dl.href=objUrl;dl.download=msg.name||'file';dl.innerHTML='⬇ Download';wrap.appendChild(dl);
    }catch(e){wrap.innerHTML=`<span class="warn">⚠ Could not load: ${esc(e.message)}</span>`}
  })();
  return wrap;
}

function openLB(type,url,name){
  const c=document.getElementById('lightbox-media');c.innerHTML='';
  const el=document.createElement(type==='image'?'img':'video');
  if(type==='video'){el.controls=true;el.autoplay=true}
  el.src=url;c.appendChild(el);
  document.getElementById('lb-dl').href=url;document.getElementById('lb-dl').download=name;
  document.getElementById('lightbox').classList.add('active');
}
function closeLightbox(){document.getElementById('lightbox').classList.remove('active');const v=document.querySelector('#lightbox-media video');if(v)v.pause();document.getElementById('lightbox-media').innerHTML=''}

async function handleSend(){
  const text=msgInput.value.trim();if(!text||!db)return;
  msgInput.value='';msgInput.style.height='';setTyping(false);
  const enc=await encStr(text);
  const msg={sender:currentUser,ts:Date.now(),type:'text',ct:enc.ct,iv:enc.iv};
  const ref=await db.ref('messages').push(msg);
  msg.key=ref.key;msgKeys.add(ref.key);msgHistory.push(msg);
  await renderMsg(msg);scrollBottom();scheduleBackup();
}

function setTyping(val){if(!typRef)return;typRef.set(val);clearTimeout(typingTimer);if(val)typingTimer=setTimeout(()=>setTyping(false),2000)}

async function handleFiles(files){
  if(!db)return;
  for(const file of files){
    if(!file.type.startsWith('image/')&&!file.type.startsWith('video/')){toast('Only images and videos.',true);continue}
    if(file.size>100*1024*1024){toast(`${file.name} over 100 MB limit.`,true);continue}
    toast(`🔐 Encrypting ${file.name}…`);
    try{
      const buf=await file.arrayBuffer();const{ct,iv}=await encBuf(buf);
      const id=Date.now()+'-'+Math.random().toString(16).slice(2,8);
      const safe=file.name.replace(/[^a-zA-Z0-9._-]/g,'_');const ghPath=`media/${id}_${safe}.enc`;
      toast(`📤 Uploading ${file.name}…`);
      await ghUploadBuf(ghPath,ct,`Add ${safe}`);
      const msg={sender:currentUser,ts:Date.now(),type:file.type.startsWith('video/')?'video':'image',name:file.name,contentType:file.type,size:file.size,ghPath,iv};
      const ref=await db.ref('messages').push(msg);msg.key=ref.key;msgKeys.add(ref.key);msgHistory.push(msg);
      await renderMsg(msg);scrollBottom();scheduleBackup();toast(`✓ ${file.name} sent`);
    }catch(e){toast(`Upload failed: ${e.message}`,true)}
  }
}

async function unlockChat(){
  const pass=document.getElementById('unlock-password').value.trim();
  const errEl=document.getElementById('lock-err');errEl.textContent='';
  if(!pass){errEl.textContent='Enter password';return}
  if(!currentUser){errEl.textContent='Choose who you are first';return}
  if(pass!==SHARED_PASSWORD){errEl.textContent='Wrong password ✗';document.getElementById('unlock-password').value='';return}
  const salt=new TextEncoder().encode('vault-static-salt-v1');
  encKey=await deriveKey(pass,salt);
  showScreen('chat-screen');
  const other=USERS.find(n=>n!==currentUser);const m=UMETA[other];
  document.getElementById('other-name').textContent=other;
  document.getElementById('other-av').textContent=m.av;
  document.getElementById('other-av').className='hdr-av '+m.avCls;
  document.getElementById('user-badge').textContent=currentUser;
  msgInput.placeholder=`Message ${other}…`;
  await initFB();await setPresence();await loadMessages();
  setTimeout(backupAllMessages,6000);
}

function pickWho(btn){document.querySelectorAll('.who-btn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');currentUser=btn.dataset.user;document.getElementById('unlock-password').focus()}

function lockVault(){
  clearTimeout(backupTimer);
  if(presRef)presRef.set(false);if(typRef)typRef.set(false);
  encKey=null;currentUser=null;
  try{firebase.apps.forEach(a=>a.delete())}catch{}
  db=null;auth=null;
  msgList.innerHTML='<div class="sys-msg">💜 Only you two can read this. End-to-end encrypted.</div>';
  msgKeys.clear();msgHistory=[];lastSender=null;lastDay=null;
  document.getElementById('lock-err').textContent='';
  document.getElementById('unlock-password').value='';
  document.querySelectorAll('.who-btn').forEach(b=>b.classList.remove('on'));
  showScreen('lock-screen');
}

msgInput.addEventListener('input',function(){this.style.height='';this.style.height=Math.min(this.scrollHeight,140)+'px';setTyping(true)});
msgInput.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();handleSend()}});
document.getElementById('unlock-button').addEventListener('click',unlockChat);
document.getElementById('lock-button').addEventListener('click',lockVault);
document.getElementById('send-button').addEventListener('click',handleSend);
document.getElementById('file-input').addEventListener('change',e=>{handleFiles([...e.target.files]);e.target.value=''});
document.getElementById('lb-close').addEventListener('click',closeLightbox);
document.getElementById('lightbox').addEventListener('click',e=>{if(e.target.id==='lightbox')closeLightbox()});
['dragover','dragenter'].forEach(ev=>dropZone.addEventListener(ev,e=>{e.preventDefault();dropZone.classList.add('drag')}));
['dragleave','dragend'].forEach(ev=>dropZone.addEventListener(ev,()=>dropZone.classList.remove('drag')));
dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('drag');handleFiles([...e.dataTransfer.files])});
dropZone.addEventListener('click',()=>document.getElementById('file-input').click());
window.addEventListener('dragover',e=>e.preventDefault());
window.addEventListener('drop',e=>{e.preventDefault();if(db)handleFiles([...e.dataTransfer.files])});
window.addEventListener('beforeunload',()=>{if(presRef)presRef.set(false);if(typRef)typRef.set(false)});
</script>
</body>
</html>
